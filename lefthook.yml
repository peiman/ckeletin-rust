# Git hooks — automated enforcement (CKSPEC-ENF-001)
pre-commit:
  parallel: true
  commands:
    fmt:
      run: cargo fmt --all -- --check
      fail_text: "Code not formatted. Run: cargo fmt --all"
    clippy:
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      fail_text: "Clippy warnings found. Run: cargo clippy --fix"

commit-msg:
  commands:
    conventional:
      run: |
        MSG=$(cat {1})
        if ! echo "$MSG" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .+"; then
          echo "Commit message must follow Conventional Commits format"
          echo "Examples: feat: add ping command, fix: handle empty config"
          exit 1
        fi
