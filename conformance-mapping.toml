# ═══════════════════════════════════════════════════════════════
# Output (CKSPEC-OUT-001 through CKSPEC-OUT-005)
# ═══════════════════════════════════════════════════════════════

[requirements.CKSPEC-OUT-001]
title = "Three-stream output separation"
status = "met"
enforcement_level = "script"
evidence = "output.rs: stdout (data), stderr (tracing status), log file (tracing audit)."
checks = ["cargo test -p ckeletin --lib output"]
violation_tests = []

[requirements.CKSPEC-OUT-002]
title = "Machine-readable output mode"
status = "met"
enforcement_level = "script"
evidence = "--json flag. Integration tests verify JSON envelope on stdout."
checks = ["cargo test -p cli --test cli"]
violation_tests = []

[requirements.CKSPEC-OUT-003]
title = "Standardized output envelope"
status = "met"
enforcement_level = "script"
evidence = "Envelope struct: status, command, data, error. Unit tests verify serialization."
checks = ["cargo test -p ckeletin --lib output"]
violation_tests = []

[requirements.CKSPEC-OUT-004]
title = "Shadow logging"
status = "partial"
enforcement_level = "script"
evidence = "Output::success/message/error emit tracing events to the audit layer, but two gaps remain vs the MUST: (1) success/message log only the command name, not the rendered data the spec requires the audit log to contain; (2) the file audit layer is off by default (LogConfig.file_enabled=false in .ckeletin/crate/src/logging.rs), so the audit stream is not 'always active regardless of output mode'. Honest status: partial. Closing it needs the rendered data added to the success/message events and an always-on audit sink."
checks = ["cargo test -p ckeletin --lib output"]
violation_tests = []

[requirements.CKSPEC-OUT-005]
title = "Output isolation from business logic"
status = "met"
enforcement_level = "compile-time"
evidence = "Domain crate has no std::io path. Cannot write to stdout."
checks = ["cargo check --workspace"]
violation_tests = ["crates/domain/tests/violations/domain_imports_infrastructure.rs"]

