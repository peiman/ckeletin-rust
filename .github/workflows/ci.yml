name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly heartbeat (Mon 06:00 UTC): catches a new RUSTSEC advisory against a
    # frozen Cargo.lock even with zero commits — the RUSTSEC-2026-0104 failure
    # mode. Only the lightweight `advisories` job runs on schedule.
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# Tool versions are PINNED, not floating: `cargo install <tool> --locked` only
# pins the tool's own dependencies, NOT the tool version, so a breaking release
# of just/cargo-deny/cargo-llvm-cov would otherwise break CI with no change
# here. Bumping these is a deliberate, reviewable edit (kept fresh by Dependabot).
# The Rust toolchain is pinned via rust-toolchain.toml and @1.96.0 below so the
# version-sensitive trybuild snapshots stay stable.

jobs:
  advisories:
    name: Security advisories
    # Idle-repo heartbeat for new advisories. On push/PR the same scan runs
    # inside `just check`, so this only adds the scheduled (and manual) cadence.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.96.0

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.4 --locked

      - name: Check advisories
        run: cargo deny check advisories

  check:
    name: Check
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Pinned to match rust-toolchain.toml so trybuild snapshots stay stable.
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy, rustfmt, llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install just
        run: cargo install just --version 1.50.0 --locked

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.4 --locked

      # SSOT: `just check` is the single gateway.
      # Same checks run locally (lefthook + just) and in CI.
      # If you add a check, add it to Justfile — CI picks it up automatically.
      - name: Run all checks
        run: just check

  init-smoke:
    name: Scaffold init smoke
    # Upstream-only. This builds a fresh project from `just init` and asserts
    # the `ping` worked example survives — true for ckeletin-rust itself, but
    # not for derived projects (which replace ping). The guard keeps the job
    # from failing in downstream forks while still gating `just init` here.
    if: github.repository == 'peiman/ckeletin-rust' && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Pinned to match rust-toolchain.toml so trybuild snapshots stay stable.
      - uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-initsmoke-${{ hashFiles('**/Cargo.lock') }}

      - name: Install just
        run: cargo install just --version 1.50.0 --locked

      # Builds a fresh scaffold from `just init` in a temp dir and runs its full
      # test suite — catches a non-compiling project AND a mangled test file
      # (cargo check alone compiles only lib + bin).
      - name: Run scaffold init smoke test
        run: just init-smoke

  coverage:
    name: Coverage (85% min)
    # CKSPEC-TEST-002: the 85% threshold must gate the pipeline. `just coverage`
    # is too heavy for the local `just check` loop, so it gates here in CI.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Pinned to match rust-toolchain.toml so trybuild snapshots stay stable.
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --version 0.8.5 --locked

      - name: Install just
        run: cargo install just --version 1.50.0 --locked

      - name: Coverage (fails under 85%)
        run: just coverage

  conform:
    name: Conformance
    # CKSPEC-ENF-005/006/007: validate the conformance mapping covers every spec
    # requirement (against the committed vendored snapshot — hermetic, no
    # network), run each mapped check, and emit feedback signals.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Pinned to match rust-toolchain.toml so trybuild snapshots stay stable.
      - uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-conform-${{ hashFiles('**/Cargo.lock') }}

      - name: Install just
        run: cargo install just --version 1.50.0 --locked

      - name: Conformance generator
        run: just conform
