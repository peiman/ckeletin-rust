name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install just
        run: cargo install just --locked

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      # SSOT: `just check` is the single gateway.
      # Same checks run locally (lefthook + just) and in CI.
      # If you add a check, add it to Justfile — CI picks it up automatically.
      - name: Run all checks
        run: just check

  init-smoke:
    name: Scaffold init smoke
    # Upstream-only. This builds a fresh project from `just init` and asserts
    # the `ping` worked example survives — true for ckeletin-rust itself, but
    # not for derived projects (which replace ping). The guard keeps the job
    # from failing in downstream forks while still gating `just init` here.
    # Closes the gap from issue #1: init_smoke is #[ignore]d (too slow for
    # `just check`) and so was never gated until now.
    if: github.repository == 'peiman/ckeletin-rust'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-initsmoke-${{ hashFiles('**/Cargo.lock') }}

      - name: Install just
        run: cargo install just --locked

      # Builds a fresh scaffold from `just init` in a temp dir and runs its
      # full test suite — catches both a non-compiling project and a mangled
      # integration-test file (cargo check alone compiles only lib + bin).
      - name: Run scaffold init smoke test
        run: just init-smoke

  coverage:
    name: Coverage (85% min)
    # CKSPEC-TEST-002: the 85% threshold must run in the gating pipeline and
    # fail the build below it. `just coverage` is too heavy for the local
    # `just check` loop, so it gates here in CI instead.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Install just
        run: cargo install just --locked

      - name: Coverage (fails under 85%)
        run: just coverage

  conform:
    name: Conformance
    # CKSPEC-ENF-005/006/007: validate the conformance mapping covers every
    # spec requirement (fail on unmapped), run each mapped check, and emit
    # feedback signals. Regression-protects the conformance claims so the
    # report cannot silently drift from the code.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-conform-${{ hashFiles('**/Cargo.lock') }}

      - name: Install just
        run: cargo install just --locked

      - name: Conformance generator
        run: just conform
